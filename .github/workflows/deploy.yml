name: Deploy to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          passphrase: ${{ secrets.AZURE_VM_SSH_PASSPHRASE }} # Optional
          script: |
            cd /home/azureuser/Projects/4yrg/gradeloop-core-v2

            # Pull latest changes
            git pull origin main

            # Build and deploy microservices and frontend using docker-compose.prod.yaml
            docker compose -f docker-compose.prod.yaml up --build -d

            # Prune old Docker layers to save disk space
            docker system prune -f
