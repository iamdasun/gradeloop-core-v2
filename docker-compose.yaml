services:
  # =============================================================================
  # PostgreSQL 16 + pgvector  (CIPAS dedicated database)
  # =============================================================================
  cipas-postgres:
    image: pgvector/pgvector:pg16
    container_name: cipas-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: cipas_db
      POSTGRES_USER: cipas
      POSTGRES_PASSWORD: ${CIPAS_DB_PASSWORD:-cipas_secret}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      # Tuning: raise shared_buffers and work_mem for bulk INSERT workloads.
      # These are conservative values suitable for a Compose dev environment.
      # In production, tune via postgresql.conf or environment overrides.
      POSTGRES_SHARED_BUFFERS: "256MB"

    ports:
      # Exposed on host port 5435 to avoid colliding with any existing
      # PostgreSQL instance on the default 5432 port.
      - "5435:5432"

    volumes:
      - cipas-pg-data:/var/lib/postgresql/data

    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=100
        -c log_min_duration_statement=500
        -c log_statement=none
        -c timezone=UTC

    networks:
      - gradeloop-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # Traefik API Gateway
  # =============================================================================
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8000"
    environment:
      - DOCKER_API_VERSION=1.44
    ports:
      - "8000:8000"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - gradeloop-network
  # =============================================================================

  # =============================================================================
  # IAM Service (Go Fiber)
  # =============================================================================
  iam-service:
    build:
      context: ./apps/services/iam-service
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./apps/services/iam-service:/app
    container_name: iam-service
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iam.rule=PathPrefix(`/api/v1/auth`) || PathPrefix(`/api/v1/users`) || PathPrefix(`/api/v1/roles`) || PathPrefix(`/api/v1/permissions`) || PathPrefix(`/api/v1/admin`) || PathPrefix(`/api/v1/tokens`)"
      - "traefik.http.routers.iam.entrypoints=web"
      - "traefik.http.services.iam-service.loadbalancer.server.port=8081"
      # Request Size Limiting (5MB — raised to support avatar uploads up to 5 MB)
      - "traefik.http.middlewares.limit.buffering.maxRequestBodyBytes=5242880"
      # Global Rate Limiting
      - "traefik.http.middlewares.global-ratelimit.ratelimit.average=1000"
      - "traefik.http.middlewares.global-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.global-ratelimit.ratelimit.burst=100"
      # Login Rate Limiting (5 requests per minute)
      - "traefik.http.routers.iam-login.rule=Path(`/api/v1/auth/login`)"
      - "traefik.http.routers.iam-login.entrypoints=web"
      - "traefik.http.routers.iam-login.priority=100"
      - "traefik.http.middlewares.login-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.login-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.login-ratelimit.ratelimit.burst=10"
      # Apply middlewares
      - "traefik.http.routers.iam.middlewares=limit,global-ratelimit"
      - "traefik.http.routers.iam-login.middlewares=limit,login-ratelimit"

    env_file:
      - .env

    environment:
      - SERVER_PORT=${IAM_SVC_PORT}
      - ENABLE_PREFORK=${IAM_SVC_ENABLE_PREFORK}
      - DB_HOST=${GRA_DB_HOST}
      - DB_PORT=${GRA_DB_PORT}
      - DB_USER=${GRA_DB_USER}
      - DB_PASSWORD=${GRA_DB_PASSWORD}
      - DB_NAME=${IAM_SVC_DB_NAME}
      - DB_SSLMODE=${GRA_DB_SSLMODE}
      - EMAIL_SERVICE_URL=http://email-service:8082
      - FRONTEND_URL=${FRONTEND_URL}
      - SUPER_ADMIN_USERNAME=${SUPER_ADMIN_USERNAME}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY}
      - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY}
      # MinIO object storage (avatars)
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=avatars
      - MINIO_USE_SSL=false
      - MINIO_PUBLIC_HOST=${MINIO_PUBLIC_HOST:-http://localhost:9000}

    expose:
      - "8081"

    depends_on:
      - minio

    networks:
      - gradeloop-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # Email Service (dependency for IAM)
  # =============================================================================
  email-service:
    build:
      context: ./apps/services/email-service
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./apps/services/email-service:/app
    container_name: email-service
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.email.rule=PathPrefix(`/api/v1/emails`)"
      - "traefik.http.routers.email.entrypoints=web"
      - "traefik.http.services.email-service.loadbalancer.server.port=8082"
      # Define the limit middleware locally so it is registered regardless of
      # iam-service startup order. Must match the type defined in iam-service.
      - "traefik.http.middlewares.limit.buffering.maxRequestBodyBytes=5242880"
      # Apply middlewares
      - "traefik.http.routers.email.middlewares=limit"

    env_file:
      - .env

    environment:
      - APP_ENV=production
      - APP_PORT=${EMAIL_SVC_PORT}
      - DB_HOST=${GRA_DB_HOST}
      - DB_PORT=${GRA_DB_PORT}
      - DB_USER=${GRA_DB_USER}
      - DB_PASSWORD=${GRA_DB_PASSWORD}
      - DB_NAME=${EMAIL_SVC_DB_NAME}
      - DB_SSLMODE=${GRA_DB_SSLMODE}
      - SMTP_PASSWORD=${SMTP_PASS}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

    expose:
      - "8082"

    depends_on:
      - minio
      - rabbitmq

    networks:
      - gradeloop-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # Academic Service (Go Fiber)
  # =============================================================================
  academic-service:
    build:
      context: ./apps/services/academic-service
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./apps/services/academic-service:/app
    container_name: academic-service
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.academic.rule=PathPrefix(`/api/v1/departments`) || PathPrefix(`/api/v1/faculties`) || PathPrefix(`/api/v1/degrees`) || PathPrefix(`/api/v1/specializations`) || PathPrefix(`/api/v1/batches`) || PathPrefix(`/api/v1/batch-members`) || PathPrefix(`/api/v1/course-instances`) || PathPrefix(`/api/v1/course-instructors`) || PathPrefix(`/api/v1/enrollments`) || PathPrefix(`/api/v1/courses`) || PathPrefix(`/api/v1/semesters`) || PathPrefix(`/api/v1/instructor-courses`) || PathPrefix(`/api/v1/debug`)"
      - "traefik.http.routers.academic.priority=100"
      - "traefik.http.routers.academic.entrypoints=web"
      - "traefik.http.services.academic-service.loadbalancer.server.port=8083"
      # Request Size Limiting (1MB)
      - "traefik.http.middlewares.academic-limit.buffering.maxRequestBodyBytes=1048576"
      # Rate Limiting
      - "traefik.http.middlewares.academic-ratelimit.ratelimit.average=500"
      - "traefik.http.middlewares.academic-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.academic-ratelimit.ratelimit.burst=50"
      # Apply middlewares
      - "traefik.http.routers.academic.middlewares=academic-limit,academic-ratelimit"

    env_file:
      - .env

    environment:
      - SERVER_PORT=${ACADEMIC_SVC_PORT}
      - ENABLE_PREFORK=${ACADEMIC_SVC_ENABLE_PREFORK}
      - DB_HOST=${GRA_DB_HOST}
      - DB_PORT=${GRA_DB_PORT}
      - DB_USER=${GRA_DB_USER}
      - DB_PASSWORD=${GRA_DB_PASSWORD}
      - DB_NAME=${ACADEMIC_SVC_DB_NAME}
      - DB_SSLMODE=${GRA_DB_SSLMODE}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - EMAIL_SERVICE_URL=http://email-service:8082
      - IAM_SERVICE_URL=http://iam-service:8081

    expose:
      - "8083"

    depends_on:
      - iam-service

    networks:
      - gradeloop-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # Assessment Service (Go Fiber)
  # =============================================================================
  assessment-service:
    build:
      context: ./apps/services/assessment-service
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./apps/services/assessment-service:/app
    container_name: assessment-service
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Route assignments, submissions, groups, and instructor-scoped endpoints through the assessment service
      - "traefik.http.routers.assessment.rule=PathPrefix(`/api/v1/assignments`) || PathPrefix(`/api/v1/submissions`) || PathPrefix(`/api/v1/groups`) || PathPrefix(`/api/v1/instructor-assignments`) || PathPrefix(`/api/v1/instructor-submissions`)"
      - "traefik.http.routers.assessment.priority=100"
      - "traefik.http.routers.assessment.entrypoints=web"
      - "traefik.http.services.assessment-service.loadbalancer.server.port=8084"
      # Request Size Limiting (10MB — code submissions can be larger than 1MB)
      - "traefik.http.middlewares.assessment-limit.buffering.maxRequestBodyBytes=10485760"
      # Rate Limiting
      - "traefik.http.middlewares.assessment-ratelimit.ratelimit.average=500"
      - "traefik.http.middlewares.assessment-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.assessment-ratelimit.ratelimit.burst=50"
      # Apply middlewares
      - "traefik.http.routers.assessment.middlewares=assessment-limit,assessment-ratelimit"

    env_file:
      - .env

    environment:
      - SERVER_PORT=${ASSESSMENT_SVC_PORT}
      - ENABLE_PREFORK=${ASSESSMENT_SVC_ENABLE_PREFORK}
      - DB_HOST=${GRA_DB_HOST}
      - DB_PORT=${GRA_DB_PORT}
      - DB_USER=${GRA_DB_USER}
      - DB_PASSWORD=${GRA_DB_PASSWORD}
      - DB_NAME=${ASSESSMENT_SVC_DB_NAME}
      - DB_SSLMODE=${GRA_DB_SSLMODE}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - IAM_SERVICE_URL=http://iam-service:8081
      - ACADEMIC_SERVICE_URL=http://academic-service:8083
      # MinIO object storage
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=submissions
      - MINIO_USE_SSL=false
      # RabbitMQ message queue
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_SUBMISSION_WORKERS=${ASSESSMENT_SVC_SUBMISSION_WORKERS:-8}
      # Judge0 code execution service
      - JUDGE0_URL=${JUDGE0_URL}
      - JUDGE0_API_KEY=${JUDGE0_API_KEY}
      - JUDGE0_TIMEOUT_SECONDS=${JUDGE0_TIMEOUT_SECONDS:-30}
      - JUDGE0_MAX_PAYLOAD_SIZE=${JUDGE0_MAX_PAYLOAD_SIZE:-65536}

    expose:
      - "8084"

    depends_on:
      - iam-service
      - minio
      - rabbitmq

    networks:
      - gradeloop-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # CIPAS Service (Python FastAPI — Code Integrity Analysis & Plagiarism-detection)
  # =============================================================================
  cipas-service:
    build:
      context: ./apps/services/cipas-service
      dockerfile: Dockerfile
    volumes:
      - ./apps/services/cipas-service/src:/app/src
      # Mount models directory to access pre-trained models
      - ./apps/services/cipas-service/clone_detection/models:/app/clone_detection/models:ro
    command:
      [
        "/opt/venv/bin/uvicorn",
        "cipas.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8085",
        "--loop",
        "uvloop",
        "--http",
        "httptools",
        "--workers",
        "1",
        "--reload",
      ]
    container_name: cipas-service
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Route all /api/v1/cipas/* traffic to this service.
      # Also expose health and ready endpoints for monitoring.
      - "traefik.http.routers.cipas.rule=PathPrefix(`/api/v1/cipas`)"
      - "traefik.http.routers.cipas.entrypoints=web"
      - "traefik.http.services.cipas-service.loadbalancer.server.port=8085"
      # Request Size Limiting: 50 MB to accommodate batches of up to 200 × 1 MB files.
      # This is enforced at the proxy layer BEFORE bytes reach the service.
      # The service enforces its own per-file (1 MB) and batch (50 MB) limits too.
      - "traefik.http.middlewares.cipas-limit.buffering.maxRequestBodyBytes=52428800"
      # Rate Limiting: 200 batch submissions per minute with burst of 20.
      # Adjust per-deployment based on observed traffic patterns.
      - "traefik.http.middlewares.cipas-ratelimit.ratelimit.average=200"
      - "traefik.http.middlewares.cipas-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.cipas-ratelimit.ratelimit.burst=20"
      # Apply both middlewares to all CIPAS routes.
      - "traefik.http.routers.cipas.middlewares=cipas-limit,cipas-ratelimit"

    env_file:
      - .env

    environment:
      # ── Runtime ──────────────────────────────────────────────────────────────
      - CIPAS_ENV=${CIPAS_ENV:-development}
      - CIPAS_LOG_LEVEL=${CIPAS_LOG_LEVEL:-INFO}
      - CIPAS_PORT=8085
      - CIPAS_HOST=0.0.0.0
      # ── Paths ────────────────────────────────────────────────────────────────
      - CIPAS_PROJECT_ROOT=/app
      - CIPAS_DATA_DIR=/app/datasets

      # ── Database ─────────────────────────────────────────────────────────────
      # Connects to the cipas-postgres service on the internal Compose network.
      # Uses the service name as the hostname (Docker DNS resolution).
      - CIPAS_DATABASE_URL=postgresql://cipas:${CIPAS_DB_PASSWORD:-cipas_secret}@cipas-postgres:5432/cipas_db
      - CIPAS_DB_MIN_POOL_SIZE=${CIPAS_DB_MIN_POOL_SIZE:-5}
      - CIPAS_DB_MAX_POOL_SIZE=${CIPAS_DB_MAX_POOL_SIZE:-20}
      - CIPAS_DB_COMMAND_TIMEOUT=30.0

      # ── Process pool ─────────────────────────────────────────────────────────
      # 0 = os.cpu_count() — auto-detects the number of available CPU cores.
      # Override explicitly in resource-constrained environments (e.g. 2 for a
      # 2-core container) to prevent over-subscription.
      - CIPAS_PARSER_WORKERS=${CIPAS_PARSER_WORKERS:-0}
      - CIPAS_MAX_CONCURRENT_BATCHES=${CIPAS_MAX_CONCURRENT_BATCHES:-4}
      - CIPAS_BATCH_SEMAPHORE_TIMEOUT=30.0
      - CIPAS_PARSE_TASK_TIMEOUT=30.0
      - CIPAS_WORKER_MAX_TASKS_PER_CHILD=500

      # ── File limits ───────────────────────────────────────────────────────────
      - CIPAS_MAX_FILES_PER_BATCH=200
      - CIPAS_MAX_FILE_SIZE_BYTES=1048576
      - CIPAS_MAX_TOTAL_BATCH_BYTES=52428800
      - CIPAS_MAX_GRANULE_AST_NODES=10000

    expose:
      # Port 8085 is the CIPAS HTTP port (avoids collision with Traefik's 8000).
      # Only exposed internally; Traefik proxies external traffic.
      - "8085"

    depends_on:
      - cipas-postgres

    networks:
      - gradeloop-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # CIPAS Syntactics Service (Python FastAPI — Syntactic Clone Detection)
  # =============================================================================
  cipas-syntactics:
    build:
      context: ./apps/services/cipas-services/cipas-syntactics
      dockerfile: Dockerfile
    container_name: cipas-syntactics
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cipas-syntactics.rule=PathPrefix(`/api/v1/syntactics`)"
      - "traefik.http.routers.cipas-syntactics.entrypoints=web"
      - "traefik.http.services.cipas-syntactics-service.loadbalancer.server.port=${CIPAS_SYN_SVC_PORT}"
      - "traefik.http.middlewares.cipas-syntactics-limit.buffering.maxRequestBodyBytes=10485760"
      - "traefik.http.middlewares.cipas-syntactics-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.cipas-syntactics-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.cipas-syntactics-ratelimit.ratelimit.burst=10"
      - "traefik.http.routers.cipas-syntactics.middlewares=cipas-syntactics-limit,cipas-syntactics-ratelimit"

    env_file:
      - .env

    volumes:
      - ./apps/services/cipas-services/cipas-syntactics/models:/app/models:ro

    environment:
      - CIPAS_SYNTACTICS_PORT=${CIPAS_SYN_SVC_PORT}
      - CIPAS_SYNTACTICS_HOST=0.0.0.0

    expose:
      - "${CIPAS_SYN_SVC_PORT}"

    networks:
      - gradeloop-network

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:${CIPAS_SYN_SVC_PORT}/api/v1/syntactics/ready",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # CIPAS Semantics Service (Python FastAPI — Semantic Clone Detection)
  # =============================================================================
  cipas-semantics:
    build:
      context: ./apps/services/cipas-services/cipas-semantics
      dockerfile: Dockerfile
    container_name: cipas-semantics
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cipas-semantics.rule=PathPrefix(`/api/v1/semantics`)"
      - "traefik.http.routers.cipas-semantics.entrypoints=web"
      - "traefik.http.services.cipas-semantics-service.loadbalancer.server.port=${CIPAS_SEM_SVC_PORT}"
      - "traefik.http.middlewares.cipas-semantics-limit.buffering.maxRequestBodyBytes=10485760"
      - "traefik.http.middlewares.cipas-semantics-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.cipas-semantics-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.cipas-semantics-ratelimit.ratelimit.burst=10"
      - "traefik.http.routers.cipas-semantics.middlewares=cipas-semantics-limit,cipas-semantics-ratelimit"

    env_file:
      - .env

    volumes:
      - ./apps/services/cipas-services/cipas-semantics/models:/app/models:ro

    environment:
      - CIPAS_SEMANTICS_PORT=${CIPAS_SEM_SVC_PORT}
      - CIPAS_SEMANTICS_HOST=0.0.0.0

    expose:
      - "${CIPAS_SEM_SVC_PORT}"

    networks:
      - gradeloop-network

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:${CIPAS_SEM_SVC_PORT}/api/v1/semantics/ready",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # ACAFS Service (Python FastAPI — AST Extraction & Code Analysis)
  # =============================================================================
  acafs-service:
    build:
      context: ./apps/services/acafs-service
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./apps/services/acafs-service:/app
    container_name: acafs-service
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.acafs.rule=PathPrefix(`/api/v1/acafs`)"
      - "traefik.http.routers.acafs.entrypoints=web"
      - "traefik.http.services.acafs.loadbalancer.server.port=8086"
      # Request size limiting (10MB for batch operations)
      - "traefik.http.middlewares.acafs-limit.buffering.maxRequestBodyBytes=10485760"
      # Rate limiting
      - "traefik.http.middlewares.acafs-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.acafs-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.acafs-ratelimit.ratelimit.burst=20"
      - "traefik.http.routers.acafs.middlewares=acafs-limit,acafs-ratelimit"

    env_file:
      - .env

    environment:
      # Service
      - SERVICE_NAME=${ACAFS_SERVICE_NAME:-acafs-service}
      - SERVICE_PORT=${ACAFS_SERVICE_PORT:-8086}
      - SERVICE_HOST=0.0.0.0
      - LOG_LEVEL=${ACAFS_LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}

      # RabbitMQ
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBITMQ_EXCHANGE=${ACAFS_RABBITMQ_EXCHANGE:-submissions}
      - RABBITMQ_QUEUE=${ACAFS_RABBITMQ_QUEUE:-acafs.evaluation}
      - RABBITMQ_ROUTING_KEY=${ACAFS_RABBITMQ_ROUTING_KEY:-submission.created}
      - RABBITMQ_CONCURRENCY=${ACAFS_RABBITMQ_CONCURRENCY:-4}

      # PostgreSQL (shared with assessment service)
      - DATABASE_URL=postgresql://${GRA_DB_USER}:${GRA_DB_PASSWORD}@${GRA_DB_HOST}:${GRA_DB_PORT}/${ASSESSMENT_SVC_DB_NAME}

      # MinIO
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET:-submissions}
      - MINIO_USE_SSL=false

      # AST Parser
      - AST_MAX_LINES=${ACAFS_AST_MAX_LINES:-5000}
      - AST_TIMEOUT_SECONDS=${ACAFS_AST_TIMEOUT_SECONDS:-2}

    expose:
      - "8086"

    depends_on:
      - rabbitmq
      - minio

    networks:
      - gradeloop-network

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8086/api/v1/acafs/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # MinIO Object Storage
  # =============================================================================
  minio:
    image: minio/minio
    container_name: gradeloop-minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}

    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console

    volumes:
      - minio-data:/data

    networks:
      - gradeloop-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # =============================================================================
  # RabbitMQ (Message Broker)
  # =============================================================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped

    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

    ports:
      - "5672:5672"
      - "15672:15672"

    networks:
      - gradeloop-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
  # =============================================================================
  # Redis (for CIPAS and other services)
  # =============================================================================
  #  redis:
  #    image: redis:7-alpine
  #    container_name: redis
  #    restart: unless-stopped
  #    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
  #    ports:
  #      - "6379:6379"
  #
  #    volumes:
  #      - redis-data:/data
  #
  #    networks:
  #      - gradeloop-network
  #
  #    healthcheck:
  #      test: [ "CMD", "redis-cli", "ping" ]
  #      interval: 10s
  #      timeout: 5s
  #      retries: 5
  #      start_period: 10s
  #
  #    logging:
  #      driver: "json-file"
  #      options:
  #        max-size: "10m"
  #        max-file: "3"
  #        compress: "true"

  # =============================================================================
  # Networks Configuration
  # =============================================================================
networks:
  gradeloop-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  minio-data:
    driver: local

  # Persistent volume for CIPAS PostgreSQL data.
  # Data survives container restarts and re-deployments.
  # To reset the DB (e.g. during development): docker volume rm cipas-pg-data
  cipas-pg-data:
    driver: local

