# Judge0 CE – runtime configuration
# Mounted read-only at /judge0.conf inside every judge0 container.
# Uses the shared redis and a dedicated postgres (judge0-db) from docker-compose.

REDIS_URL=redis://redis:6379

POSTGRES_HOST=judge0-db
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0
POSTGRES_DB=judge0

# Disable telemetry in development
JUDGE0_TELEMETRY_ENABLED=false

# Worker concurrency
WORKERS_MAX=10
INTERVAL=0.1
